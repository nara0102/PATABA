{% if messages %}
    <div id="topToast" class="toast-center-container">
        {% for message in messages %}
            <div class="mac-toast-center">
                <i class="
                bi {% if message.tags == 'success' %}
                bi-check-circle-fill text-success{% elif message.tags == 'error' %}
                bi-x-circle-fill text-danger{% else %}
                bi-exclamation-triangle-fill text-warning{% endif %} fs-5"></i>
                <div class="fw-bold" style="font-size: 0.9rem;">{{ message }}</div>
            </div>
        {% endfor %}
    </div>

    <style>
        .toast-center-container {
            position: fixed; 
            top: 20px; 
            left: 50%; 
            transform: translateX(-50%);
            z-index: 99999;
            display: flex;
            flex-direction: column;
            gap: 12px;
            pointer-events: none;
            width: 100%;
            align-items: center;
        }
        
        .mac-toast-center {
            /* Menggunakan variabel dari transpara_style.css */
            background: var(--card-light); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-soft);
            color: var(--text-main);
            
            border-radius: 50rem; 
            padding: 12px 24px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            display: flex; 
            align-items: center; 
            gap: 12px;
            pointer-events: auto;
            max-width: 90%; /* Biar gak mentok di pinggir layar HP */
            width: max-content;
            
            /* Status Awal */
            opacity: 0;
            transform: translateY(-40px) scale(0.95);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .mac-toast-center.show {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
    </style>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const toasts = document.querySelectorAll('.mac-toast-center');
            let delayMuncul = 100;
            const durasiTampil = 3000; // Dibuat lebih cepat 3 detik biar gak ganggu
            const jedaAntarToast = 500;

            toasts.forEach((toast, index) => {
                setTimeout(() => {
                    toast.classList.add('show');
                }, delayMuncul); 
                
                setTimeout(() => {
                    toast.classList.remove('show');
                    setTimeout(() => {
                        toast.remove();
                    }, 500);
                }, delayMuncul + durasiTampil); 
                
                delayMuncul += (durasiTampil + jedaAntarToast);
            });
        });
    </script>
{% endif %}
