<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aset Kendaraan | Transpara BPKAD</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&display=swap" rel="stylesheet">
    <link href='https://fonts.googleapis.com/css?family=Caveat' rel='stylesheet'>
    
    <style>
        :root { --accent-blue: #0056B3; }
        body { background-color: #f8f9fa; }
        
        .coming-soon-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            border: 1px solid rgba(0, 86, 179, 0.1);
            padding: 50px;
            text-align: center;
        }

        /* Styling untuk GIF */
        .cat-walking {
            width: 250px; 
            margin-bottom: 5px;
            border-radius: 10px; 
        }

        /* Styling Main Text */
        .font-hand-drawn {
            font-family: 'Caveat', cursive;
            font-size: 3rem; /* Dikasih ukuran lebih besar biar coretannya jelas */
            color: var(--accent-blue);
            transform: rotate(-2deg); /* Dimiringkan dikit biar makin natural kayak ditulis tangan */
            display: inline-block;
            margin-bottom: 10px;
        }

        .btn-primary-custom {
            background-color: #003F87 !important;
            color: #ffffff !important;
            border: none;
            border-radius: 25px;
            padding: 0.6rem 1.2rem;
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-block;
        }
        .btn-primary-custom:hover { 
            background-color: #002D5E !important; 
            transform: translateY(-2px); 
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center vh-100">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="coming-soon-card shadow-lg">
                    
                    <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExZTcwN2pxZ3JuazRwd3g4YXJsbDJ3bTFuZHEwaTc3Z3FpdnpqNWk0MCZlcD12MV9naWZzX3JlbGF0ZWQmY3Q9Zw/D5GyCFkInbJlu/giphy.gif" alt="Kucing Loading" class="cat-walking">
                                        
                    <h2 class="font-hand-drawn">Ooops! Masih Dalam Konstruksi</h2>
                    <p class="text-muted mt-3 mb-4" style="font-family: 'Caveat', cursive; font-size: 23px;">
                        Fitur <b>Aset Kendaraan</b> belum tersedia saat ini.<br>
                        Hubungi tim developer untuk informasi lebih lanjut.<br>
                    </p>
                    
                    <button onclick="window.history.back();" class="btn btn-primary-custom">
                        <i class="bi bi-arrow-left me-2" style="font-family: 'Caveat', cursive;"></i>Kembali
                    </button>
                    
                </div>
            </div>
        </div>
    </div>

</body>
</html>
